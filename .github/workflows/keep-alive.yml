name: Keep-Alive

on:
  schedule:
    - cron: "0 */6 * * *"  # Cada 6 horas
  workflow_dispatch:         # Permite ejecutarlo manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        run: curl -s -o /dev/null -w "%{http_code}" https://taskflow-api-pe4h.onrender.com/api/v1/health